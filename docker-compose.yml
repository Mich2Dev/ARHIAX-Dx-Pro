services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: arhiax
      POSTGRES_PASSWORD: arhiax
      POSTGRES_DB: arhiax_dx
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arhiax -d arhiax_dx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  governance:
    build:
      context: ./back
    ports:
      - "8088:8088"
    env_file:
      - ./back/.env
    volumes:
      - ./back/var:/app/var
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8088/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  migrate:
    build:
      context: ./back-api
    command: sh -c "alembic upgrade head && (python -m api.seed || true)"
    environment:
      DATABASE_URL: postgresql://arhiax:arhiax@postgres:5432/arhiax_dx
      GOVERNANCE_API_URL: http://governance:8088
      SECRET_KEY: arhiax-dx-dev-secret-change-in-prod
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./back-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://arhiax:arhiax@postgres:5432/arhiax_dx
      REDIS_URL: redis://redis:6379/0
      GOVERNANCE_API_URL: http://governance:8088
      DXPRO_URL: http://dxpro:8310
      SECRET_KEY: arhiax-dx-dev-secret-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "480"
      APP_URL: http://localhost:3001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SPECS_PATH: /app/specs
      LEDGER_PATH: /app/var/evidence-ledger.jsonl
    volumes:
      - ./back-api/src:/app/src
      - ./back/specs:/app/specs:ro
      - ./back/var:/app/var
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      governance:
        condition: service_healthy
      dxpro:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: ./back-api
    command: python -m api.worker
    environment:
      DATABASE_URL: postgresql+asyncpg://arhiax:arhiax@postgres:5432/arhiax_dx
      REDIS_URL: redis://redis:6379/0
      GOVERNANCE_API_URL: http://governance:8088
      SECRET_KEY: arhiax-dx-dev-secret-change-in-prod
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SPECS_PATH: /app/specs
      LEDGER_PATH: /app/var/evidence-ledger.jsonl
    volumes:
      - ./back-api/src:/app/src
      - ./back/specs:/app/specs:ro
      - ./back/var:/app/var
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  dxpro:
    build:
      context: ./ARHIAX-Dx-Pro
      dockerfile: Dockerfile.prod
    ports:
      - "8310:8310"
    environment:
      DXPRO_HOST: 0.0.0.0
      DXPRO_PORT: "8310"
      DXPRO_ENV: development
      DXPRO_LEDGER_PATH: /app/data/evidence.jsonl
      DXPRO_CASE_STORE_ROOT: /app/data/cases
      DXPRO_EXPORT_ROOT: /app/data/exports
      DXPRO_POLICY_BUNDLE_PATH: /app/policy-bundle-pmel-v1.0.0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dxpro_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8310/healthz')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./front
      args:
        INTERNAL_API_URL: http://api:8000
    ports:
      - "3001:3000"
    environment:
      # Rewrite /api/backend → API en la red Docker (requiere rebuild; ver Dockerfile ARG).
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  dxpro_data:
